name: Build feed

# Авто-пересборка курируемого фида услуг vliga62 со страниц сайта (≤30 позиций, SKILL.md Шаг 5 / §21).
# Pages должен быть build_type=workflow: gh api -X PUT repos/<owner>/<repo>/pages -f build_type=workflow

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:
  push:
    branches: [main]
    paths: [build-feed.mjs, .github/workflows/build-feed.yml]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build feed
        run: node build-feed.mjs

      - id: commit
        name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet feed.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add feed.xml
            git commit -m "chore: auto-update feed.xml ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase --autostash origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage Pages artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p _site
          cp feed.xml _site/feed.xml
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: needs.build.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
