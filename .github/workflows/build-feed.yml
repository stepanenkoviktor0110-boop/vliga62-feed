name: Build feed

# Авто-пересборка курируемого фида услуг vliga62 (≤30 позиций, SKILL.md Шаг 5 / §21).
# Pages build_type=workflow → раздаётся артефакт деплоя.
# Шаг «Commit if changed» убран: коммит feed.xml + git pull --rebase на накладывающихся
# прогонах давал merge-conflict (файл меняется каждый раз) → build fail → письма владельцу.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: [build-feed.mjs, .github/workflows/build-feed.yml]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build feed
        run: node build-feed.mjs
      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp feed.xml _site/feed.xml
          touch _site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
